<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>聖靈九果・結果子分出去</title>
<meta name="description" content="連起同款的餅和魚,分給眾人——結果子分出去,直到五千人吃飽,還剩十二籃!(太14 / 約6)">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#2e7d46">
<style>
  html,body{margin:0;padding:0;height:100%;background:#1b3a26;overflow:hidden;touch-action:none;
    font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif;-webkit-user-select:none;user-select:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block;background:#87c9ee;border-radius:6px;touch-action:none}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<script src="game.js"></script>
<script>
// play-stats 三層匿名計數(lobby-play-rank):開啟 10 分去重;-start/-done 不去重;-done 帶 t=秒。零個資。
(function(){
  var host = location.hostname;
  if (host === 'localhost' || host === '127.0.0.1' || location.protocol === 'file:') return;
  window.__ping = function(key, t){
    try{
      var u = 'https://hfpc-play-stats.summer09201017.workers.dev/api/ping?g=' + key + (t ? '&t=' + t : '');
      if (navigator.sendBeacon) navigator.sendBeacon(u); else fetch(u, { mode: 'no-cors' });
    }catch(e){}
  };
  try{
    var k = 'ping-fruit9-tsum', now = Date.now(), last = 0;
    try{ last = +localStorage.getItem(k) || 0; }catch(e){}
    if (now - last > 10*60*1000){ window.__ping('fruit9-tsum'); try{ localStorage.setItem(k, ''+now); }catch(e){} }
  }catch(e){}
  // 真實停留:開頁→第一次離開(切走/鎖屏/關閉)回報一發,Worker 記平均+最近一次(-dwell)
  var _dwT0 = Date.now(), _dwSent = false;
  function _dwLeave(){
    if (_dwSent) return; _dwSent = true;
    var sec = Math.round((Date.now() - _dwT0) / 1000);
    if (sec >= 3 && sec <= 1800) window.__ping('fruit9-tsum-dwell', sec);
  }
  addEventListener('visibilitychange', function(){ if (document.visibilityState === 'hidden') _dwLeave(); });
  addEventListener('pagehide', _dwLeave);
})();
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}
</script>
</body>
</html>
